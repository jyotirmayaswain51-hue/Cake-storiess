 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lija Ice Cake Gallery</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fff0f5; text-align: center; margin: 0; padding: 20px; }
        .header { background-color: #ff69b4; color: white; padding: 30px; border-radius: 15px; margin-bottom: 30px; }
        .cake-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .cake-card { background: white; border-radius: 20px; overflow: hidden; width: 280px; box-shadow: 0 6px 15px rgba(0,0,0,0.1); }
        .cake-card img { width: 100%; height: 250px; object-fit: cover; }
        .cake-details { padding: 20px; }
        .price { color: #d02090; font-weight: bold; font-size: 1.4em; }
        .order-btn { display: inline-block; background-color: #25D366; color: white; padding: 12px 25px; text-decoration: none; border-radius: 30px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Lija Ice Cake Gallery 🎂</h1>
        <p>Fresh & Delicious Cakes in Banpur</p>
    </div>

    <div class="cake-grid">
        <div class="cake-card">
            <img src="chocolate cake.jpg" alt="Chocolate Cake">
            <div class="cake-details">
                <h3>Chocolate Ice Cake</h3>
                <p class="price">₹700</p>
                <a href="https://wa.me/918260199285?text=Hi, I want to order Chocolate Ice Cake" class="order-btn">Order on WhatsApp</a>
            </div>
        </div>

        <div class="cake-card">
            <img src="biscoff cake.jpg" alt="Biscoff Cake">
            <div class="cake-details">
                <h3>Biscoff Ice Cake</h3>
                <p class="price">₹800</p>
                <a href="https://wa.me/918260199285?text=Hi, I want to order Biscoff Ice Cake" class="order-btn">Order on WhatsApp</a>
            </div>
        </div>

        <div class="cake-card">
            <img src="rasmalai cake.jpg" alt="Ras Malai Cake">
            <div class="cake-details">
                <h3>Ras Malai Ice Cake</h3>
                <p class="price">₹800</p>
                <a href="https://wa.me/918260199285?text=Hi, I want to order Ras Malai Ice Cake" class="order-btn">Order on WhatsApp</a>
            </div>
        </div>
    </div>

</body>
</html>
<div style="font-family: Arial, sans-serif; border: 1px solid #ddd; padding: 20px; width: 300px;">
  <h2 style="color: #4A2C2A;">Cake Menu (500g)</h2>
  <hr>
  <div style="display: flex; justify-content: space-between;">
    <span>Chocolate Ice Cake</span>
    <strong>Rs 350</strong>
  </div>
  <div style="display: flex; justify-content: space-between; margin-top: 10px;">
    <span>Rasmalai Ice Cake</span>
    <strong>Rs 400</strong>
  </div>
</div>
